<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Audiências PF</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#003580">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Audiências PF">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #003580 0%, #00235a 60%, #1a1a2e 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,.35);
      padding: 2.5rem 2rem; width: 100%; max-width: 380px;
    }
    .logo-area { text-align: center; margin-bottom: 1.5rem; }
    .logo-area .shield { font-size: 3.5rem; color: #C9A84C; }
    .logo-area h1 { font-size: 1.1rem; font-weight: 700; color: #003580; margin: 0; }
    .logo-area p  { font-size: .78rem; color: #888; margin: 0; }
    .btn-pf { background: #003580; color: #fff; border: none; width: 100%; padding: .75rem; font-weight: 600; border-radius: 8px; }
    .btn-pf:hover { background: #00235a; color: #fff; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo-area">
    <div class="shield"><i class="bi bi-shield-fill-check"></i></div>
    <h1>POLÍCIA FEDERAL</h1>
    <p>Sistema de Audiências Judiciais</p>
  </div>

  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
    <div class="alert alert-{{ cat }} alert-dismissible py-2 mb-3" role="alert">
      {{ msg }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="/login">
    <div class="mb-3">
      <label class="form-label fw-semibold small">Login</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" class="form-control" name="login" required autofocus
               placeholder="Seu login" autocomplete="username">
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold small">Senha</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" class="form-control" name="senha" required
               placeholder="Sua senha" autocomplete="current-password">
      </div>
    </div>
    <button type="submit" class="btn btn-pf">
      <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
    </button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js').catch(() => {});
  }
</script>
</body>
</html>
