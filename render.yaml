services:
  - type: web
    name: audiencias-pf
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: audiencias-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: audiencias-db
    databaseName: audiencias
    plan: free
